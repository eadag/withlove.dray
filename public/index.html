<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/withlovedray-logo.png" />
    <link rel="stylesheet" href="./style.css" />
    <title>withlove.dray</title>
  </head>
  <body>
    <div id="welcScreen" class="screen activeScr">
      <div class="background"></div>
      <button id="enterBooth" data-section="photobooth">Enter</button>
    </div>

    <div id="photobooth" class="screen">
      <div class="cameraBg"></div>
      <button id="startCapture">Start</button>
      <div id="countdown" class="countdown">3</div>
      <video id="videoCapture" class="video-capture" autoplay></video>
    </div>

    <div id="resultScreen" class="screen">
      <div class="resultBg"></div>
      <div id="photoResult"></div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
